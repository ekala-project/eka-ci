<!doctype html>
<html lang="en">
    <head>
        <!-- Some html boilerplate -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            /* Copied from `elm make` output, no idea why they do this and if we need it. */
            body {
                padding: 0;
                margin: 0;
            }
        </style>

        <!--
        Use a nice mono space font, because we deserve bettern than Courier.
        No thought has been given to this choice, replace at will.
        -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/firacode@6.2.0/distr/fira_code.css"
        />

        <!--
        Tachyons CSS: utility-first CSS framework for fast, responsive UI development.
        -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css"
        />

        <!--
        Custom EkaCI styles for status badges, progress bars, and log viewer.
        -->
        <link rel="stylesheet" href="styles/custom.css" />

        <!--
        The server is configured to try and serve all files that are in this directory
        first. It will only fall back to serving this index file if it cannot find the
        requested path.
        -->
        <script src="main.js"></script>
        <script type="module">
            import { setupPorts } from './ports.js';

            // Initialize the Elm application
            const app = Elm.Main.init();

            // Set up WebSocket ports
            setupPorts(app);
        </script>
    </head>
    <body>
    </body>
</html>
